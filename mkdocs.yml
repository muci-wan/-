site_name: 个人笔记
site_description: 我的个人知识库
site_url: https://muci-wan.github.io/notebook

repo_name: muci-wan/notebook
repo_url: https://github.com/muci-wan/notebook

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: 切换深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换浅色模式
  features:
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight

nav:
  - 首页: index.md
  - 笔记:
    - 2026年:
      - 6月: notes/2026/06/20.md
  - MySQL:
    - 目录: mysql/index.md
    - 01-基础与DDL: mysql/01-基础与DDL.md
    - 02-DML与查询: mysql/02-DML与查询.md
    - 03-索引与优化: mysql/03-索引与优化.md
    - 04-事务与锁: mysql/04-事务与锁.md
    - 05-高级特性: mysql/05-高级特性.md
    - 06-运维管理: mysql/06-运维管理.md

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
